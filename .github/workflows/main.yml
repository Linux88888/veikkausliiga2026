name: Test Veikkausliiga 2026

on:
  push:
    branches: [ main, 'copilot/**' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Create output directory
      run: mkdir -p output

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run main.py (generates all reports)
      run: python scripts/main.py

    - name: Verify required output files
      run: |
        echo "✓ Output files generated:"
        ls -lah output/
        missing=0
        for f in output/Tilastot2026.md output/Ennusteet2026.md output/Yleiso2026.md output/Ottelut2026.md; do
          if [ -f "$f" ]; then
            echo "✓ $f"
          else
            echo "✗ PUUTTUU: $f"
            missing=1
          fi
        done
        if [ "$missing" -eq 1 ]; then
          echo "❌ Yksi tai useampi tiedosto puuttuu!"
          exit 1
        fi
        echo "✅ Kaikki raportit löytyvät."

    - name: Commit and push output files
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add output/
        git diff --cached --quiet || git commit -m "🔄 Update output files - $(date '+%Y-%m-%d %H:%M:%S')"
        git push || true

    - name: Upload artifacts (backup)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-output
        path: output/
        retention-days: 30
        if-no-files-found: warn
