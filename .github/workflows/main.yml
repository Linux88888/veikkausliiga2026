name: Test Veikkausliiga 2026

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Verify project structure
      run: |
        echo "=== Repository Structure ==="
        ls -la
        echo ""
        echo "=== Scripts Directory ==="
        ls -la scripts/

    - name: Test imports
      run: |
        echo "=== Testing Python Imports ==="
        python -c "import sys; print(f'Python version: {sys.version}')"
        python -c "from scripts.config import TEAMS_2026, WATCHED_PLAYERS; print(f'✓ Config loaded: {len(TEAMS_2026)} teams, {len(WATCHED_PLAYERS)} players')"
        python -c "import requests; print('✓ Requests library imported')"
        python -c "import bs4; print('✓ BeautifulSoup4 library imported')"

    - name: Run configuration test
      run: |
        echo "=== Configuration Test ==="
        python -c "from scripts.config import *; print('✓ All config values loaded successfully')"

    - name: Run fetch_stats.py
      run: |
        echo "=== Running fetch_stats.py ==="
        python scripts/fetch_stats.py
        echo "✓ fetch_stats.py completed"

    - name: Run match_predictor.py
      run: |
        echo "=== Running match_predictor.py ==="
        python scripts/match_predictor.py
        echo "✓ match_predictor.py completed"

    - name: Run attendance_analyzer.py
      run: |
        echo "=== Running attendance_analyzer.py ==="
        python scripts/attendance_analyzer.py
        echo "✓ attendance_analyzer.py completed"

    - name: Run main.py
      run: |
        echo "=== Running main.py (Main Script) ==="
        python scripts/main.py
        echo "✓ main.py completed"

    - name: Check generated output
      run: |
        echo "=== Generated Output Files ==="
        if [ -d "output" ]; then
          echo "Output directory contents:"
          ls -lah output/
          echo ""
          echo "=== Checking markdown files ==="
          for file in output/*.md; do
            if [ -f "$file" ]; then
              echo "File: $file ($(wc -l < $file) lines)"
            fi
          done
        else
          echo "No output directory found"
        fi

    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-output
        path: output/
        retention-days: 30

    - name: Test Summary
      if: always()
      run: |
        echo "=========================================="
        echo "✅ TEST WORKFLOW COMPLETED SUCCESSFULLY"
        echo "=========================================="
        echo "Repository: Linux88888/veikkausliiga2026"
        echo "Python Version: 3.9"
        echo "All modules tested:"
        echo "  ✓ config.py"
        echo "  ✓ fetch_stats.py"
        echo "  ✓ match_predictor.py"
        echo "  ✓ attendance_analyzer.py"
        echo "  ✓ main.py"
        echo "=========================================="
