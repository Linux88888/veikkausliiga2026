name: Test Veikkausliiga 2026

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Create output directory
      run: mkdir -p output

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run fetch_stats.py
      run: python scripts/fetch_stats.py

    - name: Run match_predictor.py
      run: python scripts/match_predictor.py

    - name: Run attendance_analyzer.py
      run: python scripts/attendance_analyzer.py

    - name: Run main.py
      run: python scripts/main.py

    - name: Check output files
      run: |
        echo "=== Output-kansion tiedostot ==="
        ls -lah output/
        echo ""
        echo "=== Tarkistetaan vaaditut raportit ==="
        MISSING=0
        for FILE in Tilastot2026.md Ennusteet2026.md Yleiso2026.md; do
          if [ -f "output/$FILE" ]; then
            echo "✓ output/$FILE löytyy"
          else
            echo "✗ output/$FILE PUUTTUU!"
            MISSING=1
          fi
        done
        if [ "$MISSING" -eq 1 ]; then
          echo "❌ Jokin raportti puuttuu!"
          exit 1
        else
          echo "✅ Kaikki raportit löytyvät!"
        fi

    - name: Commit and push output files
      run: |
        git config user.name "GitHub Actions"
        git config user.email "actions@github.com"
        git add output/
        git commit -m "🔄 Update output files - $(date '+%Y-%m-%d %H:%M:%S')" || true
        BRANCH=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}
        git push origin HEAD:$BRANCH

    - name: Upload artifacts (backup)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-output
        path: output/
        retention-days: 30
        if-no-files-found: warn
