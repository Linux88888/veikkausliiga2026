name: Test Veikkausliiga 2026

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Check Python environment
      run: |
        echo "=== Python Info ==="
        python --version
        pip list
        echo ""
        echo "=== Working Directory ==="
        pwd
        ls -la

    - name: Run fetch_stats.py with debug
      run: |
        echo "=== Running fetch_stats.py ==="
        python -u scripts/fetch_stats.py
        echo "Exit code: $?"
        echo ""

    - name: Run match_predictor.py with debug
      run: |
        echo "=== Running match_predictor.py ==="
        python -u scripts/match_predictor.py
        echo "Exit code: $?"
        echo ""

    - name: Run attendance_analyzer.py with debug
      run: |
        echo "=== Running attendance_analyzer.py ==="
        python -u scripts/attendance_analyzer.py
        echo "Exit code: $?"
        echo ""

    - name: Check if output directory was created
      run: |
        echo "=== Checking output directory ==="
        if [ -d "output" ]; then
          echo "✓ Output directory EXISTS"
          ls -lah output/
          echo ""
          echo "=== Files in output directory ==="
          find output -type f -exec ls -lh {} \;
        else
          echo "✗ Output directory NOT FOUND"
          echo "Creating output directory manually..."
          mkdir -p output
          ls -la
        fi

    - name: Run main.py
      run: |
        echo "=== Running main.py ==="
        python -u scripts/main.py
        echo "Exit code: $?"

    - name: Final check - List all generated files
      run: |
        echo "=== Directory listing after all scripts ==="
        ls -lah
        echo ""
        echo "=== Contents of output directory ==="
        if [ -d "output" ]; then
          ls -lah output/
          echo ""
          echo "=== Content preview of each file ==="
          for file in output/*.md; do
            if [ -f "$file" ]; then
              echo ""
              echo "--- File: $file ---"
              echo "Lines: $(wc -l < $file)"
              head -30 "$file"
            fi
          done
        else
          echo "❌ Output directory DOES NOT EXIST"
        fi

    - name: Upload artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-output
        path: output/
        retention-days: 30
        if-no-files-found: warn

    - name: Test Summary
      if: always()
      run: |
        echo "=========================================="
        echo "✅ TEST WORKFLOW COMPLETED"
        echo "=========================================="
        echo "Repository: Linux88888/veikkausliiga2026"
        echo "Python Version: 3.9"
        if [ -d "output" ]; then
          echo "Output files generated:"
          ls -1 output/ | sed 's/^/  ✓ /'
        else
          echo "⚠️  No output files generated"
        fi
        echo "=========================================="
